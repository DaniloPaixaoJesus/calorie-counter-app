services:
  bff-service:
    container_name: calorie-counter-bff
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      BFF_PROFILES_ACTIVE: ${BFF_PROFILES_ACTIVE:-local}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-true}
      APP_API_SECURITY_ENABLED: ${APP_API_SECURITY_ENABLED:-true}
      APP_API_KEY_HEADER: ${APP_API_KEY_HEADER:-X-App-Api-Key}
      APP_API_RATE_LIMIT_PER_MINUTE: ${APP_API_RATE_LIMIT_PER_MINUTE:-30}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-mock}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-20}
      CNARH_40_BASE_URL: ${CNARH_40_BASE_URL:-http://host.docker.internal:9001}
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
