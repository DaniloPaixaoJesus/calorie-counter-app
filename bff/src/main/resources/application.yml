server:
  port: ${PORT:8080}
  servlet:
    context-path: /${spring.application.name}
  tomcat: # Para expor métricas do tomcat
    mbeanregistry:
      enabled: true
spring:
  profiles:
    active: ${BFF_PROFILES_ACTIVE:local}
  application:
    name: bff-service
    version: 0.0.1
  mvc:
    throw-exception-if-no-handler-found: true
  #Database properties
  datasource:
    url: ${DB_URL:jdbc:h2:mem:nutritydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: ${H2_CONSOLE_PATH:/h2}
      settings:
        trace: false
        web-allow-others: true
  jpa:
    showSql: ${JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
  
  sql:
    init:
      platform: h2

feign:
  client:
    config:
      default:
        loggerLevel: full
        request-interceptor: br.com.nutrity.vfpsolution.config.loginterceptor.FeignLoggingInterceptor

logging:
    level:
        br.com.nutrity.vfpsolution: ${LOG_LEVEL_ROOT:INFO}

# Cloud properties
cloud:
  service-name:
    context:
      property: some-cloud-setup-value-here


# Domain business rule properties
boiler-plate-domain:
  properties: some-business-rule-value-here

nutrity:
  security:
    app-api:
      enabled: ${APP_API_SECURITY_ENABLED:true}
      header-name: ${APP_API_KEY_HEADER:X-App-Api-Key}
      key: ${APP_API_KEY:}
      requests-per-minute: ${APP_API_RATE_LIMIT_PER_MINUTE:30}
  ai:
    default-provider: ${AI_DEFAULT_PROVIDER:mock}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_MODEL:gpt-4.1-mini}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:20}

feign-client:
  cnarh40:
    baseUrl: ${CNARH_40_BASE_URL:http://localhost:9001}

# Management/Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,shutdown,info
  endpoint:
    health:
      show-details: always
      probes: 
        enabled: true
    prometheus: # Contexto /actuator/prometheus
      enabled: true
    shutdown: # Contexto /actuator/shutdown
      enabled: true
    metrics:
      enabled: true
  health:
    livenessstate: # /actuator/health/liveness
      enabled: true
    readinessstate: # /actuator/health/readiness
      enabled: true
